services:
  task-manager:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # DATABASE_URL must be provided via .env or shell env; do NOT inline real
      # credentials here. Example:
      #   DATABASE_URL=mysql+aiomysql://USER:CHANGE_ME@DB_HOST:3306/DB_NAME
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./task_manager.db}
    volumes:
      - ./backend:/app
    networks:
      - management
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node-agent:
    build:
      context: ./node_agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AGENT_PORT=8001
      - DOCKER_SOCKET=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - management
    privileged: true

networks:
  management:
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.20.0.0/24